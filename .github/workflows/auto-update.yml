name: Auto Update Repository

on:
  workflow_dispatch: # Запуск вручную
  schedule:
    - cron: '0 0 * * *' # Или по расписанию, если нужно

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_TEST }}
          fetch-depth: 0

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Update README.md
        run: |
          echo "# Проект: Реконструкция Кода" > README.md
          echo "" >> README.md
          echo "## О проекте" >> README.md
          echo "Этот репозиторий предназначен для хранения и реконструкции кода." >> README.md
          echo "" >> README.md
          echo "## Для чего это нужно" >> README.md
          echo "- Восстановление утерянных данных" >> README.md
          echo "- Обучение работе с Git и GitHub Actions" >> README.md
          echo "- Автоматическое обновление файлов" >> README.md
          echo "" >> README.md
          echo "Последнее обновление: $(date)" >> README.md

      - name: Commit and Push changes
        run: |
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update README.md [skip ci]"
            git push origin HEAD
          fi
