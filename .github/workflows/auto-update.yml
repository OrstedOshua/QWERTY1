name: Auto Update Repository

on:
  workflow_dispatch: # Запуск вручную из вкладки Actions
  push:
    branches:
      - main # Или ваша основная ветка (master, develop и т.д.)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешение на запись в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # Используем ваш секретный токен
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Make changes (Example)
        run: |
          # Здесь можно добавить скрипты для автоматического изменения файлов
          # Например, обновление версии в файле или генерация отчета
          echo "Last updated: $(date)" >> last_update.txt

          # Если есть изменения, добавляем и коммитим их
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: auto-update by GitHub Actions"
            git push origin HEAD
            echo "Changes pushed successfully!"
          else
            echo "No changes to commit."
          fi
