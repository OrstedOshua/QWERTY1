name: Self-Evolving Agent

on:
  push:
    paths:
      - '.github/workflows/universal-bot.yml'
      - 'agent_config.txt'
  workflow_dispatch:

jobs:
  agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_TEST }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Self-Evolving Bot"
          git config --global user.email "bot@local.host"

      - name: Read & Execute Agent Commands
        id: execute
        run: |
          echo "🤖 Agent starting..."
          
          # Создаем файл конфигурации, если его нет
          if [ ! -f agent_config.txt ]; then
            echo "# Agent Config: Waiting for instructions" > agent_config.txt
          fi

          # Читаем команды из файла
          COMMANDS=$(cat agent_config.txt | grep "^CMD:" | sed 's/^CMD://')
          
          if [ -z "$COMMANDS" ]; then
            echo "⚠️ No commands found in agent_config.txt. Waiting for update."
            echo "has_work=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📜 Executing commands:"
          echo "$COMMANDS"
          
          # Выполняем команды
          eval "$COMMANDS"
          
          echo "has_work=true" >> $GITHUB_OUTPUT

      - name: Smart Commit & Push
        if: steps.execute.outputs.has_work == 'true'
        run: |
          git add -A
          
          # Проверяем, есть ли изменения
          if git diff-index --quiet HEAD; then
            echo "✅ No new changes to commit."
          else
            TIMESTAMP=$(date +%s)
            # Хак для предотвращения мгновенного зацикливания: ждем, если прошло меньше минуты
            LAST_COMMIT_TIME=$(git log -1 --format=%ct 2>/dev/null || echo 0)
            DIFF=$((TIMESTAMP - LAST_COMMIT_TIME))
            
            if [ $DIFF -lt 60 ]; then
              echo "⏳ Too fast! Waiting to avoid loop spam (GitHub min interval)."
              sleep 5 
            fi

            git commit -m "🤖 Agent Execution: Auto-update and self-evolution"
            
            # Пушим с силой, чтобы обновить и этот файл тоже
            git push origin HEAD:${{ github.ref }} --force
            echo "🚀 Changes pushed. Agent will re-trigger on next push."
          fi
